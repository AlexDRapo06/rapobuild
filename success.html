<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registration Confirmed — Footy Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #111111;
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    text-align: center;
    max-width: 560px;
    width: 100%;
  }
  .icon {
    width: 64px;
    height: 64px;
    background: #D2122E;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4rem);
    line-height: 0.95;
    margin-top: 24px;
  }
  p {
    margin-top: 16px;
    font-size: 16px;
    color: rgba(255, 255, 255, 0.7);
    line-height: 1.6;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 40px;
    background: #D2122E;
    color: #ffffff;
    padding: 18px 36px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    text-decoration: none;
    letter-spacing: 0.05em;
    transition: background-color 200ms ease;
  }
  .btn:hover { background: #A20E22; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>REGISTRATION CONFIRMED.</h1>
    <p>Your spot is locked. Check your email for a receipt — we'll follow up with camp details within 24 hours.</p>
    <a href="/" class="btn">BACK TO FOOTY UP &rarr;</a>
  </div>
</body>
</html>
